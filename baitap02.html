<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT02 - Form đăng ký</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .message{
            text-align:center;
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

        .checkbox{
            display:flex;
            align-items:center;
            gap:10px;
            margin:15px 0;
        }

        .checkbox input{
            width:auto;
        }

    </style>

</head>

<body>

<header>

<h1>BÀI TẬP 2</h1>

<nav>

<ul>

<li><a href="index.html">Trang chủ</a></li>
<li><a href="baitap01.html">Bài 1</a></li>
<li><a href="baitap02.html">Bài 2</a></li>
<li><a href="baitap03.html">Bài 3</a></li>
<li><a href="about.html">Lý thuyết</a></li>
<li><a href="contact.html">Điểm danh</a></li>

</ul>

</nav>

</header>

<main>

<form id="registerForm">

<h2 style="text-align:center;margin-bottom:20px;">

Đăng ký người dùng

</h2>

<input
type="text"
id="name"
placeholder="Nhập họ tên"
required>

<input
type="email"
id="email"
placeholder="Nhập email"
required>

<input
type="password"
id="password"
placeholder="Nhập mật khẩu"
required>

<div class="checkbox">

<input
type="checkbox"
id="agree">

<label for="agree">

Đồng ý điều khoản

</label>

</div>

<button type="submit">

Đăng ký

</button>

<p id="message" class="message"></p>

</form>

</main>

<footer>

<p>Đề thi kết thúc học phần</p>

</footer>

<script>

const form=document.getElementById("registerForm");

const message=document.getElementById("message");

form.addEventListener("submit",function(event){

event.preventDefault();

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value;

const agree=document.getElementById("agree").checked;

/* Email */

const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

/* Password */

const passwordRegex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

if(name===""){

message.className="message error";

message.innerHTML="Vui lòng nhập họ tên.";

return;

}

if(!emailRegex.test(email)){

message.className="message error";

message.innerHTML="Email không hợp lệ.";

return;

}

if(!passwordRegex.test(password)){

message.className="message error";

message.innerHTML="Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.";

return;

}

if(!agree){

message.className="message error";

message.innerHTML="Bạn phải đồng ý điều khoản.";

return;

}

/* Lưu LocalStorage */

const user={

name:name,

email:email,

password:password

};

localStorage.setItem("user",JSON.stringify(user));

message.className="message success";

message.innerHTML="Đăng ký thành công.";

form.reset();

});

</script>

</body>
</html>
